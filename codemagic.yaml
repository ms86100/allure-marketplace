# Codemagic CI/CD Configuration for Sociva
# Builds iOS and Android apps in the cloud - no Mac required!
#
# Setup Instructions:
# 1. Connect this repo to Codemagic (codemagic.io)
# 2. Add required environment variables (see below)
# 3. Trigger a build!

workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Sociva App Store Connect

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier:
          - app.sociva.community
          - app.sociva.community.LiveDeliveryWidget
      vars:
        BUNDLE_ID: "app.sociva.community"
        WIDGET_BUNDLE_ID: "app.sociva.community.LiveDeliveryWidget"
        APP_NAME: "Sociva"
        CAPACITOR_ENV: "production"
      node: 22
      xcode: latest
      cocoapods: 1.16.2

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Pin CocoaPods for linker stability
        script: |
          gem install cocoapods -v 1.16.2 --no-document
          pod --version

      - name: Build web app
        script: npm run build

      - name: Add iOS platform and set up CocoaPods
        script: |
          npx cap add ios || true
          npx cap sync ios
          cd ios/App
          # Capacitor 8 defaults to SPM — remove ALL SPM artifacts before switching to CocoaPods
          rm -f Package.swift .package.resolved
          rm -rf .build
          rm -rf App.xcodeproj/project.xcworkspace/xcshareddata/swiftpm
          # HARD FIX: also remove Swift Package refs from project.pbxproj itself
          # so Firebase is not linked through both SPM and CocoaPods.
          ruby - << 'RUBY'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('App.xcodeproj')

          project.targets.each do |target|
            if target.respond_to?(:package_product_dependencies)
              target.package_product_dependencies.to_a.each { |dep| dep.remove_from_project }
            end
          end

          project.root_object.package_references.to_a.each { |ref| ref.remove_from_project }
          project.save
          RUBY
          # Generate Podfile with all Capacitor plugins + Firebase
          # CRITICAL: Capacitor 8 requires iOS 16.0 minimum
          cat > Podfile << 'PODFILE'
          require_relative '../../node_modules/@capacitor/ios/scripts/pods_helpers'

          platform :ios, '16.1'
          use_frameworks! :linkage => :static

          # workaround to avoid Xcode caching of Pods that requires
          # temporary clearing of the project's build directory
          install! 'cocoapods', :disable_input_output_paths => true

          def capacitor_pods
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCommunityFcm', :path => '../../node_modules/@capacitor-community/fcm'
            pod 'CapacitorApp', :path => '../../node_modules/@capacitor/app'
            pod 'CapacitorCamera', :path => '../../node_modules/@capacitor/camera'
            pod 'CapacitorGeolocation', :path => '../../node_modules/@capacitor/geolocation'
            pod 'CapacitorHaptics', :path => '../../node_modules/@capacitor/haptics'
            pod 'CapacitorKeyboard', :path => '../../node_modules/@capacitor/keyboard'
            pod 'CapacitorPreferences', :path => '../../node_modules/@capacitor/preferences'
            pod 'CapacitorPushNotifications', :path => '../../node_modules/@capacitor/push-notifications'
            pod 'CapacitorSplashScreen', :path => '../../node_modules/@capacitor/splash-screen'
            pod 'CapacitorStatusBar', :path => '../../node_modules/@capacitor/status-bar'
          end

          target 'App' do
            capacitor_pods
            pod 'FirebaseCore'
            pod 'FirebaseMessaging'
          end

          post_install do |installer|
            assertDeploymentTarget(installer)
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '16.1'
                config.build_settings['SWIFT_ENABLE_EXPLICIT_MODULES'] = 'NO'
                # Prevent pod targets from conflicting with main app's install
                config.build_settings['SKIP_INSTALL'] = 'YES'
              end
              # Xcode 16 creates duplicate ExtractAppIntentsMetadata phases
              # for Firebase pods — remove all but the first to fix
              # "Multiple commands produce … Metadata.appintents" error.
              dupes = target.build_phases.select { |p|
                p.respond_to?(:name) && p.name&.include?("AppIntents")
              }
              dupes.drop(1).each { |p| p.remove_from_project }
            end
          end
          PODFILE
          echo "=== Final Podfile ==="
          # deterministic resolver on clean CI nodes
          pod install --repo-update

      - name: Patch AppDelegate for Firebase + Capacitor + LiveActivity
        script: |
          APPDELEGATE="ios/App/App/AppDelegate.swift"
          cat > "$APPDELEGATE" << 'SWIFT'
          import UIKit
          import Capacitor
          import FirebaseCore

          @UIApplicationMain
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?

              func application(_ application: UIApplication,
                               didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  FirebaseApp.configure()
                  // Register LiveActivity Capacitor plugin
                  if #available(iOS 16.1, *) {
                      bridge?.registerPluginInstance(LiveActivityPlugin())
                  }
                  return true
              }

              // Capacitor URL handling (deep links, OAuth redirects)
              func application(_ app: UIApplication, open url: URL,
                               options: [UIApplication.OpenURLOptionsKey: Any] = [:]) -> Bool {
                  return ApplicationDelegateProxy.shared.application(app, open: url, options: options)
              }

              // Capacitor Universal Links handling
              func application(_ application: UIApplication,
                               continue userActivity: NSUserActivity,
                               restorationHandler: @escaping ([UIUserActivityRestoring]?) -> Void) -> Bool {
                  return ApplicationDelegateProxy.shared.application(application,
                               continue: userActivity, restorationHandler: restorationHandler)
              }

              // APNs token forwarding to Capacitor
              func application(_ application: UIApplication,
                               didRegisterForRemoteNotificationsWithDeviceToken deviceToken: Data) {
                  NotificationCenter.default.post(name: .capacitorDidRegisterForRemoteNotifications, object: deviceToken)
              }

              func application(_ application: UIApplication,
                               didFailToRegisterForRemoteNotificationsWithError error: Error) {
                  NotificationCenter.default.post(name: .capacitorDidFailToRegisterForRemoteNotifications, object: error)
              }

              // Forward background/data notifications to Firebase Messaging plugin
              func application(_ application: UIApplication,
                               didReceiveRemoteNotification userInfo: [AnyHashable : Any],
                               fetchCompletionHandler completionHandler: @escaping (UIBackgroundFetchResult) -> Void) {
                  NotificationCenter.default.post(name: Notification.Name.init("didReceiveRemoteNotification"), object: completionHandler, userInfo: userInfo)
              }
          }
          SWIFT

      - name: Add Push Notification & Live Activity Entitlements
        script: |
          cd ios/App
          # Create entitlements file with push + ActivityKit
          cat > App/App.entitlements << 'ENTITLEMENTS'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>aps-environment</key>
              <string>production</string>
              <key>com.apple.developer.associated-domains</key>
              <array>
                  <string>applinks:block-eats.lovable.app</string>
              </array>
              <key>com.apple.developer.activitykit</key>
              <true/>
          </dict>
          </plist>
          ENTITLEMENTS

          # Link entitlements to Xcode project
          ruby - << 'RUBY'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('App.xcodeproj')
          project.targets.each do |target|
            next unless target.name == 'App'
            target.build_configurations.each do |config|
              config.build_settings['CODE_SIGN_ENTITLEMENTS'] = 'App/App.entitlements'
            end
          end
          project.save
          RUBY

      - name: Enable Push Notification & Background Modes capabilities
        script: |
          cd ios/App
          # Add UIBackgroundModes to Info.plist
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" App/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string remote-notification" App/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:1 string fetch" App/Info.plist 2>/dev/null || true
          # CRITICAL: Disable Firebase method swizzling so our manual APNs token
          # forwarding in AppDelegate.swift doesn't conflict with Firebase's auto-swizzling.
          # Without this, the permission prompt can silently fail to appear.
          /usr/libexec/PlistBuddy -c "Add :FirebaseAppDelegateProxyEnabled bool false" App/Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :FirebaseAppDelegateProxyEnabled false" App/Info.plist
          echo "=== FirebaseAppDelegateProxyEnabled set to false ==="
          # Enable Supports Live Activities in Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSSupportsLiveActivities bool true" App/Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :NSSupportsLiveActivities true" App/Info.plist
          echo "=== NSSupportsLiveActivities enabled ==="

      - name: Inject iOS privacy usage strings
        script: |
          cd ios/App
          # ITMS-90683: Guarantee all required NSUsageDescription keys exist
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 'Sociva needs photo library access to let you select images for product listings and your profile.'" App/Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Sociva needs photo library access to let you select images for product listings and your profile.'" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryAddUsageDescription 'Sociva needs permission to save images to your photo library.'" App/Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 'Sociva needs permission to save images to your photo library.'" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'Sociva needs camera access to let you photograph products for listing and upload profile pictures.'" App/Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Sociva needs camera access to let you photograph products for listing and upload profile pictures.'" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :NSLocationWhenInUseUsageDescription 'Sociva uses your location to verify your residential society membership and show nearby sellers.'" App/Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string 'Sociva uses your location to verify your residential society membership and show nearby sellers.'" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :NSLocationAlwaysAndWhenInUseUsageDescription 'Sociva uses your location to verify your residential society membership and show nearby sellers, even in the background.'" App/Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :NSLocationAlwaysAndWhenInUseUsageDescription string 'Sociva uses your location to verify your residential society membership and show nearby sellers, even in the background.'" App/Info.plist
          echo "=== Privacy strings injected ==="

      - name: Copy GoogleService-Info.plist
        script: |
          # If you have GoogleService-Info.plist in your repo root or ios-config folder
          if [ -f "ios-config/GoogleService-Info.plist" ]; then
            cp ios-config/GoogleService-Info.plist ios/App/App/GoogleService-Info.plist
          elif [ -f "GoogleService-Info.plist" ]; then
            cp GoogleService-Info.plist ios/App/App/GoogleService-Info.plist
          fi

          # Link to Xcode project if it exists
          if [ -f "ios/App/App/GoogleService-Info.plist" ]; then
            cd ios/App
            ruby -e "require 'xcodeproj'; project = Xcodeproj::Project.open('App.xcodeproj'); target = project.targets.find { |t| t.name == 'App' }; abort('App target not found') unless target; group = project.main_group.find_subpath('App', true); ref = group.files.find { |f| f.path == 'GoogleService-Info.plist' } || group.new_file('GoogleService-Info.plist'); unless target.resources_build_phase.files_references.any? { |f| f.path == 'GoogleService-Info.plist' }; target.resources_build_phase.add_file_reference(ref, true); end; project.save"
          fi

      - name: Copy custom notification sound
        script: |
          if [ -f "ios-config/gate_bell.mp3" ]; then
            cp ios-config/gate_bell.mp3 ios/App/App/gate_bell.mp3
            echo "=== gate_bell.mp3 copied to ios/App/App/ ==="
          fi
          if [ -f "ios/App/App/gate_bell.mp3" ]; then
            cd ios/App
            ruby -e "require 'xcodeproj'; project = Xcodeproj::Project.open('App.xcodeproj'); target = project.targets.find { |t| t.name == 'App' }; abort('App target not found') unless target; group = project.main_group.find_subpath('App', true); ref = group.files.find { |f| f.path == 'gate_bell.mp3' } || group.new_file('gate_bell.mp3'); unless target.resources_build_phase.files_references.any? { |f| f.path == 'gate_bell.mp3' }; target.resources_build_phase.add_file_reference(ref, true); end; project.save"
            echo "=== gate_bell.mp3 linked to Xcode project ==="
          fi

      - name: Copy Live Activity native plugin files
        script: |
          echo "=== Copying Live Activity Swift files ==="
          cp native/ios/LiveActivityPlugin.swift ios/App/App/
          cp native/ios/LiveDeliveryActivity.swift ios/App/App/
          echo "=== Adding Swift files to App target ==="
          cd ios/App
          ruby - << 'RUBY'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('App.xcodeproj')
          target = project.targets.find { |t| t.name == 'App' }
          abort('App target not found') unless target
          group = project.main_group.find_subpath('App', true)

          %w[LiveActivityPlugin.swift LiveDeliveryActivity.swift].each do |filename|
            ref = group.files.find { |f| f.path == filename } || group.new_file(filename)
            unless target.source_build_phase.files_references.any? { |f| f.path == filename }
              target.source_build_phase.add_file_reference(ref, true)
            end
          end

          project.save
          puts "=== Live Activity plugin files added to App target ==="
          RUBY

      - name: Create Live Activity Widget Extension
        script: |
          cd ios/App
          echo "=== Creating LiveDeliveryWidgetExtension target ==="

          # Copy widget Swift files
          mkdir -p LiveDeliveryWidgetExtension
          cp ../../native/ios/LiveDeliveryWidget.swift LiveDeliveryWidgetExtension/
          cp ../../native/ios/LiveDeliveryActivity.swift LiveDeliveryWidgetExtension/

          # Create widget extension Info.plist
          cat > LiveDeliveryWidgetExtension/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>$(DEVELOPMENT_LANGUAGE)</string>
              <key>CFBundleDisplayName</key>
              <string>Sociva Live Delivery</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>$(PRODUCT_NAME)</string>
              <key>CFBundlePackageType</key>
              <string>$(PRODUCT_BUNDLE_PACKAGE_TYPE)</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>NSExtension</key>
              <dict>
                  <key>NSExtensionPointIdentifier</key>
                  <string>com.apple.widgetkit-extension</string>
              </dict>
          </dict>
          </plist>
          PLIST

          # Create widget extension entitlements
          cat > LiveDeliveryWidgetExtension/LiveDeliveryWidgetExtension.entitlements << 'ENTITLEMENTS'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.developer.activitykit</key>
              <true/>
          </dict>
          </plist>
          ENTITLEMENTS

          # Use Ruby xcodeproj gem to create the widget extension target
          ruby - << 'RUBY'
          require 'xcodeproj'

          TEAM_ID = '6HBR38JB8Z'

          project = Xcodeproj::Project.open('App.xcodeproj')
          app_target = project.targets.find { |t| t.name == 'App' }
          abort('App target not found') unless app_target

          widget_targets = project.targets.select { |t| t.name.start_with?('LiveDeliveryWidgetExtension') }
          existing = project.targets.find { |t| t.name == 'LiveDeliveryWidgetExtension' }

          if existing
            puts '=== Widget extension already exists ==='
            widget_target = existing
          else
            puts '=== Creating LiveDeliveryWidgetExtension target ==='
            widget_target = project.new_target(:app_extension, 'LiveDeliveryWidgetExtension', :ios, '16.1')
          end

          (widget_targets - [widget_target]).each do |duplicate|
            puts "=== Removing duplicate target: #{duplicate.name} ==="
            duplicate.remove_from_project
          end

          widget_group = project.main_group.find_subpath('LiveDeliveryWidgetExtension', true)

          %w[LiveDeliveryWidget.swift LiveDeliveryActivity.swift].each do |filename|
            ref = widget_group.files.find { |f| f.path == filename } || widget_group.new_file(filename)
            unless widget_target.source_build_phase.files_references.any? { |f| f.path == filename }
              widget_target.source_build_phase.add_file_reference(ref, true)
            end
          end

          widget_group.files.find { |f| f.path == 'Info.plist' } || widget_group.new_file('Info.plist')
          widget_group.files.find { |f| f.path == 'LiveDeliveryWidgetExtension.entitlements' } || widget_group.new_file('LiveDeliveryWidgetExtension.entitlements')

          widget_target.build_configurations.each do |config|
            settings = config.build_settings
            settings['PRODUCT_NAME'] = 'LiveDeliveryWidgetExtension'
            settings['PRODUCT_BUNDLE_IDENTIFIER'] = 'app.sociva.community.LiveDeliveryWidget'
            settings['INFOPLIST_FILE'] = 'LiveDeliveryWidgetExtension/Info.plist'
            settings['CODE_SIGN_ENTITLEMENTS'] = 'LiveDeliveryWidgetExtension/LiveDeliveryWidgetExtension.entitlements'
            settings['IPHONEOS_DEPLOYMENT_TARGET'] = '16.1'
            settings['SWIFT_VERSION'] = '5.0'
            settings['TARGETED_DEVICE_FAMILY'] = '1,2'
            settings['GENERATE_INFOPLIST_FILE'] = 'NO'
            settings['CURRENT_PROJECT_VERSION'] = '1'
            settings['MARKETING_VERSION'] = '1.0'
            settings['SKIP_INSTALL'] = 'YES'
            settings['APPLICATION_EXTENSION_API_ONLY'] = 'YES'
            settings['DEVELOPMENT_TEAM'] = TEAM_ID
            settings['LD_RUNPATH_SEARCH_PATHS'] = ['$(inherited)', '@executable_path/Frameworks', '@executable_path/../../Frameworks']
          end

          embed_phase = app_target.build_phases.find { |p| p.is_a?(Xcodeproj::Project::Object::PBXCopyFilesBuildPhase) && p.name == 'Embed App Extensions' }
          unless embed_phase
            embed_phase = app_target.new_copy_files_build_phase('Embed App Extensions')
            embed_phase.dst_subfolder_spec = '13'
          end

          embed_phase.files.to_a.each do |build_file|
            path = build_file.file_ref&.path.to_s
            next unless path.end_with?('.appex')
            next unless path.include?('LiveDeliveryWidgetExtension') || path == '.appex'
            build_file.remove_from_project
          end

          product_ref = widget_target.product_reference
          abort('Widget product reference missing') unless product_ref
          product_ref.path = 'LiveDeliveryWidgetExtension.appex'
          product_ref.name = 'LiveDeliveryWidgetExtension.appex'
          product_ref.explicit_file_type = 'wrapper.app-extension'

          build_file = embed_phase.add_file_reference(product_ref, true)
          build_file.settings = { 'ATTRIBUTES' => ['RemoveHeadersOnCopy'] }

          unless app_target.dependencies.any? { |d| d.target == widget_target }
            app_target.add_dependency(widget_target)
          end

          target_names = project.targets.map(&:name)
          puts "=== Xcode targets: #{target_names.join(', ')} ==="
          expected_targets = ['App', 'LiveDeliveryWidgetExtension']
          missing_targets = expected_targets - target_names
          unexpected_targets = target_names - expected_targets
          abort("Missing expected targets: #{missing_targets.join(', ')}") unless missing_targets.empty?
          abort("Unexpected targets present: #{unexpected_targets.join(', ')}") unless unexpected_targets.empty?

          project.save
          puts '=== LiveDeliveryWidgetExtension target reconciled and embedded ==='
          RUBY

      - name: Update iOS project settings
        script: |
          cd ios/App
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = .*;/PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID;/g" App.xcodeproj/project.pbxproj
          # Set deployment target to 16.1 for ActivityKit Live Activities support
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 16.1/g" App.xcodeproj/project.pbxproj
          # Restore widget extension bundle ID (sed above overwrites it)
          ruby - << 'RUBY'
          require 'xcodeproj'
          TEAM_ID = '6HBR38JB8Z'

          project = Xcodeproj::Project.open('App.xcodeproj')
          project.targets.each do |target|
            next unless target.name.start_with?('LiveDeliveryWidgetExtension')
            target.build_configurations.each do |config|
              settings = config.build_settings
              settings['PRODUCT_BUNDLE_IDENTIFIER'] = 'app.sociva.community.LiveDeliveryWidget'
              settings['PRODUCT_NAME'] = 'LiveDeliveryWidgetExtension'
              settings['IPHONEOS_DEPLOYMENT_TARGET'] = '16.1'
              settings['DEVELOPMENT_TEAM'] = TEAM_ID
            end
          end
          project.save
          RUBY

      - name: Set up code signing
        script: |
          keychain initialize
          # Fetch signing for main app
          app-store-connect fetch-signing-files "app.sociva.community" \
            --type IOS_APP_STORE \
            --create
          # Fetch signing for widget extension
          app-store-connect fetch-signing-files "app.sociva.community.LiveDeliveryWidget" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
          WIDGET_PROFILE=$(find ~/Library/MobileDevice/Provisioning\ Profiles -name '*.mobileprovision' -exec grep -l 'LiveDeliveryWidget' {} \; 2>/dev/null | head -1)
          if [ -z "$WIDGET_PROFILE" ]; then
            echo "ERROR: Widget provisioning profile not found after fetch."
            ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "No profiles directory"
            exit 1
          fi
          WIDGET_PROFILE_PLIST=$(mktemp)
          security cms -D -i "$WIDGET_PROFILE" > "$WIDGET_PROFILE_PLIST"
          export WIDGET_PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$WIDGET_PROFILE_PLIST")
          export WIDGET_PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$WIDGET_PROFILE_PLIST")
          echo "✅ Widget profile found: $WIDGET_PROFILE_NAME ($WIDGET_PROFILE_UUID)"
          cd ios/App
          ruby - << 'RUBY'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('App.xcodeproj')
          widget = project.targets.find { |t| t.name == 'LiveDeliveryWidgetExtension' }
          abort('Widget target not found') unless widget
          widget.build_configurations.each do |config|
            settings = config.build_settings
            settings['CODE_SIGN_STYLE'] = 'Manual'
            settings['DEVELOPMENT_TEAM'] = '6HBR38JB8Z'
            settings['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
            settings['CODE_SIGN_IDENTITY[sdk=iphoneos*]'] = 'Apple Distribution'
            settings['PROVISIONING_PROFILE_SPECIFIER'] = ENV.fetch('WIDGET_PROFILE_NAME')
            settings['PROVISIONING_PROFILE'] = ENV.fetch('WIDGET_PROFILE_UUID')
          end
          project.save
          RUBY
          cd ../..
          rm -f "$WIDGET_PROFILE_PLIST"

      - name: Verify widget signing settings
        script: |
          cd ios/App
          ruby - << 'RUBY'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('App.xcodeproj')
          widget = project.targets.find { |t| t.name == 'LiveDeliveryWidgetExtension' }
          abort('Widget target not found') unless widget
          widget.build_configurations.each do |config|
            s = config.build_settings
            puts "=== #{config.name} ==="
            puts "  BUNDLE_ID: #{s['PRODUCT_BUNDLE_IDENTIFIER']}"
            puts "  TEAM: #{s['DEVELOPMENT_TEAM']}"
            puts "  SIGN_STYLE: #{s['CODE_SIGN_STYLE']}"
            puts "  SIGN_IDENTITY: #{s['CODE_SIGN_IDENTITY']}"
            puts "  PROFILE_SPECIFIER: #{s['PROVISIONING_PROFILE_SPECIFIER']}"
            puts "  PROFILE: #{s['PROVISIONING_PROFILE']}"
          end
          RUBY

      - name: Set export compliance & increment build number
        script: |
          cd ios/App
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" App/Info.plist || \
            /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" App/Info.plist
          BUILD_NUMBER=$(date +%s)
          echo "Setting build number to $BUILD_NUMBER"
          agvtool new-version -all $BUILD_NUMBER
          # Also set build number on widget extension
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" LiveDeliveryWidgetExtension/Info.plist

      - name: Verify push entitlement exists
        script: |
          if ! grep -q "aps-environment" ios/App/App/App.entitlements; then
            echo "ERROR: Push Notifications entitlement missing from App.entitlements"
            exit 1
          fi

      - name: Verify ActivityKit entitlement exists
        script: |
          if ! grep -q "com.apple.developer.activitykit" ios/App/App/App.entitlements; then
            echo "ERROR: ActivityKit entitlement missing from App.entitlements"
            exit 1
          fi
          if ! grep -q "com.apple.developer.activitykit" ios/App/LiveDeliveryWidgetExtension/LiveDeliveryWidgetExtension.entitlements; then
            echo "ERROR: ActivityKit entitlement missing from widget extension"
            exit 1
          fi

      - name: Verify AppDelegate push registration
        script: |
          if ! grep -q "didRegisterForRemoteNotificationsWithDeviceToken" ios/App/App/AppDelegate.swift; then
            echo "ERROR: AppDelegate missing APNs token forwarding"
            exit 1
          fi

      - name: Build iOS app
        script: |
          cd ios/App
          set -o pipefail
          xcodebuild \
            -workspace "App.xcworkspace" \
            -scheme "App" \
            -configuration "Release" \
            -archivePath "$PWD/build/ios/xcarchive/App.xcarchive" \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM=6HBR38JB8Z \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_STYLE=Manual \
            2>&1 | tee /tmp/xcodebuild-archive.log
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App" \
            --config "Release"

      - name: Validate IPA push entitlement
        script: |
          cd ios/App/build/ios/ipa
          IPA=$(ls *.ipa | head -n 1)
          mkdir -p /tmp/ipa-check && cd /tmp/ipa-check
          unzip -qo "$(find /Users -path '*/build/ios/ipa/*.ipa' | head -1)" 2>/dev/null || true
          if ! grep -r "aps-environment" Payload/ 2>/dev/null; then
            echo "ERROR: Final IPA missing aps-environment entitlement"
            exit 1
          fi
          echo "=== IPA push entitlement verified ==="

      - name: Validate IPA contains a single widget extension
        script: |
          cd /tmp/ipa-check
          COUNT=$(find Payload/App.app/PlugIns -maxdepth 1 -name "*.appex" | wc -l | tr -d ' ')
          if [ "$COUNT" -ne 1 ]; then
            echo "ERROR: Expected exactly one widget extension .appex, found $COUNT"
            find Payload/App.app/PlugIns -maxdepth 1 -name "*.appex" -print
            exit 1
          fi
          if [ ! -d "Payload/App.app/PlugIns/LiveDeliveryWidgetExtension.appex" ]; then
            echo "ERROR: LiveDeliveryWidgetExtension.appex not found"
            exit 1
          fi
          echo "=== Single LiveDeliveryWidgetExtension.appex verified ==="

    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - ios/App/build/ios/ipa/*.dSYM.zip

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      android_signing:
        - sociva_keystore
      groups:
        - google_play
      vars:
        BUNDLE_ID: "app.sociva.community"
        APP_NAME: "Sociva"
        CAPACITOR_ENV: "production"
      node: 22
      java: 17

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Build web app
        script: npm run build

      - name: Add Android platform
        script: |
          npx cap add android || true
          npx cap sync android

      - name: Copy custom notification sound (Android)
        script: |
          mkdir -p android/app/src/main/res/raw
          if [ -f "ios-config/gate_bell.mp3" ]; then
            cp ios-config/gate_bell.mp3 android/app/src/main/res/raw/gate_bell.mp3
            echo "=== gate_bell.mp3 copied to Android res/raw/ ==="
          fi

      - name: Set Android SDK location
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Build Android release bundle
        script: cd android && ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true

  release-all:
    name: Release All Platforms
    max_build_duration: 90
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Sociva App Store Connect

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.sociva.community
      android_signing:
        - sociva_keystore
      groups:
        - google_play
      vars:
        BUNDLE_ID: "app.sociva.community"
        WIDGET_BUNDLE_ID: "app.sociva.community.LiveDeliveryWidget"
        APP_NAME: "Sociva"
        CAPACITOR_ENV: "production"
      node: 22
      xcode: latest
      cocoapods: 1.16.2
      java: 17

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Pin CocoaPods for linker stability
        script: |
          gem install cocoapods -v 1.16.2 --no-document
          pod --version

      - name: Build web app
        script: npm run build

      - name: Add iOS platform and set up CocoaPods
        script: |
          npx cap add ios || true
          npx cap sync ios
          cd ios/App
          rm -f Package.swift .package.resolved
          rm -rf .build
          rm -rf App.xcodeproj/project.xcworkspace/xcshareddata/swiftpm
          # HARD FIX: also remove Swift Package refs from project.pbxproj itself
          # so Firebase is not linked through both SPM and CocoaPods.
          ruby - << 'RUBY'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('App.xcodeproj')

          project.targets.each do |target|
            if target.respond_to?(:package_product_dependencies)
              target.package_product_dependencies.to_a.each { |dep| dep.remove_from_project }
            end
          end

          project.root_object.package_references.to_a.each { |ref| ref.remove_from_project }
          project.save
          RUBY
          cat > Podfile << 'PODFILE'
          require_relative '../../node_modules/@capacitor/ios/scripts/pods_helpers'

          platform :ios, '16.1'
          use_frameworks! :linkage => :static

          install! 'cocoapods', :disable_input_output_paths => true

          def capacitor_pods
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCommunityFcm', :path => '../../node_modules/@capacitor-community/fcm'
            pod 'CapacitorApp', :path => '../../node_modules/@capacitor/app'
            pod 'CapacitorCamera', :path => '../../node_modules/@capacitor/camera'
            pod 'CapacitorGeolocation', :path => '../../node_modules/@capacitor/geolocation'
            pod 'CapacitorHaptics', :path => '../../node_modules/@capacitor/haptics'
            pod 'CapacitorKeyboard', :path => '../../node_modules/@capacitor/keyboard'
            pod 'CapacitorPreferences', :path => '../../node_modules/@capacitor/preferences'
            pod 'CapacitorPushNotifications', :path => '../../node_modules/@capacitor/push-notifications'
            pod 'CapacitorSplashScreen', :path => '../../node_modules/@capacitor/splash-screen'
            pod 'CapacitorStatusBar', :path => '../../node_modules/@capacitor/status-bar'
          end

          target 'App' do
            capacitor_pods
            pod 'FirebaseCore'
            pod 'FirebaseMessaging'
          end

          post_install do |installer|
            assertDeploymentTarget(installer)
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '16.1'
                config.build_settings['SWIFT_ENABLE_EXPLICIT_MODULES'] = 'NO'
                config.build_settings['SKIP_INSTALL'] = 'YES'
              end
              dupes = target.build_phases.select { |p|
                p.respond_to?(:name) && p.name&.include?("AppIntents")
              }
              dupes.drop(1).each { |p| p.remove_from_project }
            end
          end
          PODFILE
          echo "=== Final Podfile ==="
          cat Podfile
          pod install --repo-update

      - name: Patch AppDelegate for Firebase + Capacitor + LiveActivity
        script: |
          APPDELEGATE="ios/App/App/AppDelegate.swift"
          cat > "$APPDELEGATE" << 'SWIFT'
          import UIKit
          import Capacitor
          import FirebaseCore

          @UIApplicationMain
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?

              func application(_ application: UIApplication,
                               didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  FirebaseApp.configure()
                  if #available(iOS 16.1, *) {
                      bridge?.registerPluginInstance(LiveActivityPlugin())
                  }
                  return true
              }

              func application(_ app: UIApplication, open url: URL,
                               options: [UIApplication.OpenURLOptionsKey: Any] = [:]) -> Bool {
                  return ApplicationDelegateProxy.shared.application(app, open: url, options: options)
              }

              func application(_ application: UIApplication,
                               continue userActivity: NSUserActivity,
                               restorationHandler: @escaping ([UIUserActivityRestoring]?) -> Void) -> Bool {
                  return ApplicationDelegateProxy.shared.application(application,
                               continue: userActivity, restorationHandler: restorationHandler)
              }

              func application(_ application: UIApplication,
                               didRegisterForRemoteNotificationsWithDeviceToken deviceToken: Data) {
                  NotificationCenter.default.post(name: .capacitorDidRegisterForRemoteNotifications, object: deviceToken)
              }

              func application(_ application: UIApplication,
                               didFailToRegisterForRemoteNotificationsWithError error: Error) {
                  NotificationCenter.default.post(name: .capacitorDidFailToRegisterForRemoteNotifications, object: error)
              }

              // Forward background/data notifications to Firebase Messaging plugin
              func application(_ application: UIApplication,
                               didReceiveRemoteNotification userInfo: [AnyHashable : Any],
                               fetchCompletionHandler completionHandler: @escaping (UIBackgroundFetchResult) -> Void) {
                  NotificationCenter.default.post(name: Notification.Name.init("didReceiveRemoteNotification"), object: completionHandler, userInfo: userInfo)
              }
          }
          SWIFT

      - name: Add Push Notification & Live Activity Entitlements
        script: |
          cd ios/App
          cat > App/App.entitlements << 'ENTITLEMENTS'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>aps-environment</key>
              <string>production</string>
              <key>com.apple.developer.associated-domains</key>
              <array>
                  <string>applinks:block-eats.lovable.app</string>
              </array>
              <key>com.apple.developer.activitykit</key>
              <true/>
          </dict>
          </plist>
          ENTITLEMENTS

          ruby - << 'RUBY'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('App.xcodeproj')
          project.targets.each do |target|
            next unless target.name == 'App'
            target.build_configurations.each do |config|
              config.build_settings['CODE_SIGN_ENTITLEMENTS'] = 'App/App.entitlements'
            end
          end
          project.save
          RUBY

      - name: Enable Push Notification & Background Modes capabilities
        script: |
          cd ios/App
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" App/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string remote-notification" App/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:1 string fetch" App/Info.plist 2>/dev/null || true
          # CRITICAL: Disable Firebase method swizzling (same as ios-release workflow)
          /usr/libexec/PlistBuddy -c "Add :FirebaseAppDelegateProxyEnabled bool false" App/Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :FirebaseAppDelegateProxyEnabled false" App/Info.plist
          echo "=== FirebaseAppDelegateProxyEnabled set to false ==="
          # Enable Supports Live Activities in Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSSupportsLiveActivities bool true" App/Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :NSSupportsLiveActivities true" App/Info.plist
          echo "=== NSSupportsLiveActivities enabled ==="

      - name: Inject iOS privacy usage strings
        script: |
          cd ios/App
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 'Sociva needs photo library access to let you select images for product listings and your profile.'" App/Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Sociva needs photo library access to let you select images for product listings and your profile.'" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryAddUsageDescription 'Sociva needs permission to save images to your photo library.'" App/Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 'Sociva needs permission to save images to your photo library.'" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'Sociva needs camera access to let you photograph products for listing and upload profile pictures.'" App/Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Sociva needs camera access to let you photograph products for listing and upload profile pictures.'" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :NSLocationWhenInUseUsageDescription 'Sociva uses your location to verify your residential society membership and show nearby sellers.'" App/Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string 'Sociva uses your location to verify your residential society membership and show nearby sellers.'" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :NSLocationAlwaysAndWhenInUseUsageDescription 'Sociva uses your location to verify your residential society membership and show nearby sellers, even in the background.'" App/Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :NSLocationAlwaysAndWhenInUseUsageDescription string 'Sociva uses your location to verify your residential society membership and show nearby sellers, even in the background.'" App/Info.plist
          echo "=== Privacy strings injected ==="

      - name: Copy GoogleService-Info.plist
        script: |
          if [ -f "ios-config/GoogleService-Info.plist" ]; then
            cp ios-config/GoogleService-Info.plist ios/App/App/GoogleService-Info.plist
          elif [ -f "GoogleService-Info.plist" ]; then
            cp GoogleService-Info.plist ios/App/App/GoogleService-Info.plist
          fi

          if [ -f "ios/App/App/GoogleService-Info.plist" ]; then
            cd ios/App
            ruby -e "require 'xcodeproj'; project = Xcodeproj::Project.open('App.xcodeproj'); target = project.targets.find { |t| t.name == 'App' }; abort('App target not found') unless target; group = project.main_group.find_subpath('App', true); ref = group.files.find { |f| f.path == 'GoogleService-Info.plist' } || group.new_file('GoogleService-Info.plist'); unless target.resources_build_phase.files_references.any? { |f| f.path == 'GoogleService-Info.plist' }; target.resources_build_phase.add_file_reference(ref, true); end; project.save"
          fi

      - name: Copy custom notification sound
        script: |
          if [ -f "ios-config/gate_bell.mp3" ]; then
            cp ios-config/gate_bell.mp3 ios/App/App/gate_bell.mp3
          fi
          if [ -f "ios/App/App/gate_bell.mp3" ]; then
            cd ios/App
            ruby -e "require 'xcodeproj'; project = Xcodeproj::Project.open('App.xcodeproj'); target = project.targets.find { |t| t.name == 'App' }; abort('App target not found') unless target; group = project.main_group.find_subpath('App', true); ref = group.files.find { |f| f.path == 'gate_bell.mp3' } || group.new_file('gate_bell.mp3'); unless target.resources_build_phase.files_references.any? { |f| f.path == 'gate_bell.mp3' }; target.resources_build_phase.add_file_reference(ref, true); end; project.save"
          fi

      - name: Copy Live Activity native plugin files
        script: |
          echo "=== Copying Live Activity Swift files ==="
          cp native/ios/LiveActivityPlugin.swift ios/App/App/
          cp native/ios/LiveDeliveryActivity.swift ios/App/App/
          echo "=== Adding Swift files to App target ==="
          cd ios/App
          ruby - << 'RUBY'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('App.xcodeproj')
          target = project.targets.find { |t| t.name == 'App' }
          abort('App target not found') unless target
          group = project.main_group.find_subpath('App', true)

          %w[LiveActivityPlugin.swift LiveDeliveryActivity.swift].each do |filename|
            ref = group.files.find { |f| f.path == filename } || group.new_file(filename)
            unless target.source_build_phase.files_references.any? { |f| f.path == filename }
              target.source_build_phase.add_file_reference(ref, true)
            end
          end

          project.save
          puts "=== Live Activity plugin files added to App target ==="
          RUBY

      - name: Create Live Activity Widget Extension
        script: |
          cd ios/App
          echo "=== Creating LiveDeliveryWidgetExtension target ==="

          mkdir -p LiveDeliveryWidgetExtension
          cp ../../native/ios/LiveDeliveryWidget.swift LiveDeliveryWidgetExtension/
          cp ../../native/ios/LiveDeliveryActivity.swift LiveDeliveryWidgetExtension/

          cat > LiveDeliveryWidgetExtension/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>$(DEVELOPMENT_LANGUAGE)</string>
              <key>CFBundleDisplayName</key>
              <string>Sociva Live Delivery</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>$(PRODUCT_NAME)</string>
              <key>CFBundlePackageType</key>
              <string>$(PRODUCT_BUNDLE_PACKAGE_TYPE)</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>NSExtension</key>
              <dict>
                  <key>NSExtensionPointIdentifier</key>
                  <string>com.apple.widgetkit-extension</string>
              </dict>
          </dict>
          </plist>
          PLIST

          cat > LiveDeliveryWidgetExtension/LiveDeliveryWidgetExtension.entitlements << 'ENTITLEMENTS'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.developer.activitykit</key>
              <true/>
          </dict>
          </plist>
          ENTITLEMENTS

          ruby - << 'RUBY'
          require 'xcodeproj'

          TEAM_ID = '6HBR38JB8Z'

          project = Xcodeproj::Project.open('App.xcodeproj')
          app_target = project.targets.find { |t| t.name == 'App' }
          abort('App target not found') unless app_target

          widget_targets = project.targets.select { |t| t.name.start_with?('LiveDeliveryWidgetExtension') }
          existing = project.targets.find { |t| t.name == 'LiveDeliveryWidgetExtension' }

          if existing
            puts '=== Widget extension already exists ==='
            widget_target = existing
          else
            puts '=== Creating LiveDeliveryWidgetExtension target ==='
            widget_target = project.new_target(:app_extension, 'LiveDeliveryWidgetExtension', :ios, '16.1')
          end

          (widget_targets - [widget_target]).each do |duplicate|
            puts "=== Removing duplicate target: #{duplicate.name} ==="
            duplicate.remove_from_project
          end

          widget_group = project.main_group.find_subpath('LiveDeliveryWidgetExtension', true)

          %w[LiveDeliveryWidget.swift LiveDeliveryActivity.swift].each do |filename|
            ref = widget_group.files.find { |f| f.path == filename } || widget_group.new_file(filename)
            unless widget_target.source_build_phase.files_references.any? { |f| f.path == filename }
              widget_target.source_build_phase.add_file_reference(ref, true)
            end
          end

          widget_group.files.find { |f| f.path == 'Info.plist' } || widget_group.new_file('Info.plist')
          widget_group.files.find { |f| f.path == 'LiveDeliveryWidgetExtension.entitlements' } || widget_group.new_file('LiveDeliveryWidgetExtension.entitlements')

          widget_target.build_configurations.each do |config|
            settings = config.build_settings
            settings['PRODUCT_NAME'] = 'LiveDeliveryWidgetExtension'
            settings['PRODUCT_BUNDLE_IDENTIFIER'] = 'app.sociva.community.LiveDeliveryWidget'
            settings['INFOPLIST_FILE'] = 'LiveDeliveryWidgetExtension/Info.plist'
            settings['CODE_SIGN_ENTITLEMENTS'] = 'LiveDeliveryWidgetExtension/LiveDeliveryWidgetExtension.entitlements'
            settings['IPHONEOS_DEPLOYMENT_TARGET'] = '16.1'
            settings['SWIFT_VERSION'] = '5.0'
            settings['TARGETED_DEVICE_FAMILY'] = '1,2'
            settings['GENERATE_INFOPLIST_FILE'] = 'NO'
            settings['CURRENT_PROJECT_VERSION'] = '1'
            settings['MARKETING_VERSION'] = '1.0'
            settings['SKIP_INSTALL'] = 'YES'
            settings['APPLICATION_EXTENSION_API_ONLY'] = 'YES'
            settings['CODE_SIGN_STYLE'] = 'Manual'
            settings['DEVELOPMENT_TEAM'] = TEAM_ID
            settings['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
            settings['CODE_SIGN_IDENTITY[sdk=iphoneos*]'] = 'Apple Distribution'
            settings['LD_RUNPATH_SEARCH_PATHS'] = ['$(inherited)', '@executable_path/Frameworks', '@executable_path/../../Frameworks']
          end

          embed_phase = app_target.build_phases.find { |p| p.is_a?(Xcodeproj::Project::Object::PBXCopyFilesBuildPhase) && p.name == 'Embed App Extensions' }
          unless embed_phase
            embed_phase = app_target.new_copy_files_build_phase('Embed App Extensions')
            embed_phase.dst_subfolder_spec = '13'
          end

          embed_phase.files.to_a.each do |build_file|
            path = build_file.file_ref&.path.to_s
            next unless path.end_with?('.appex')
            next unless path.include?('LiveDeliveryWidgetExtension') || path == '.appex'
            build_file.remove_from_project
          end

          product_ref = widget_target.product_reference
          abort('Widget product reference missing') unless product_ref
          product_ref.path = 'LiveDeliveryWidgetExtension.appex'
          product_ref.name = 'LiveDeliveryWidgetExtension.appex'
          product_ref.explicit_file_type = 'wrapper.app-extension'

          build_file = embed_phase.add_file_reference(product_ref, true)
          build_file.settings = { 'ATTRIBUTES' => ['RemoveHeadersOnCopy'] }

          unless app_target.dependencies.any? { |d| d.target == widget_target }
            app_target.add_dependency(widget_target)
          end

          target_names = project.targets.map(&:name)
          puts "=== Xcode targets: #{target_names.join(', ')} ==="
          expected_targets = ['App', 'LiveDeliveryWidgetExtension']
          missing_targets = expected_targets - target_names
          unexpected_targets = target_names - expected_targets
          abort("Missing expected targets: #{missing_targets.join(', ')}") unless missing_targets.empty?
          abort("Unexpected targets present: #{unexpected_targets.join(', ')}") unless unexpected_targets.empty?

          project.save
          puts '=== LiveDeliveryWidgetExtension target reconciled and embedded ==='
          RUBY

      - name: Update iOS project settings
        script: |
          cd ios/App
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = .*;/PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID;/g" App.xcodeproj/project.pbxproj
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 16.1/g" App.xcodeproj/project.pbxproj
          # Restore widget extension bundle ID (sed above overwrites it)
          ruby - << 'RUBY'
          require 'xcodeproj'
          TEAM_ID = '6HBR38JB8Z'

          project = Xcodeproj::Project.open('App.xcodeproj')
          project.targets.each do |target|
            next unless target.name.start_with?('LiveDeliveryWidgetExtension')
            target.build_configurations.each do |config|
              settings = config.build_settings
              settings['PRODUCT_BUNDLE_IDENTIFIER'] = 'app.sociva.community.LiveDeliveryWidget'
              settings['PRODUCT_NAME'] = 'LiveDeliveryWidgetExtension'
              settings['IPHONEOS_DEPLOYMENT_TARGET'] = '16.1'
              settings['CODE_SIGN_STYLE'] = 'Manual'
              settings['DEVELOPMENT_TEAM'] = TEAM_ID
              settings['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
              settings['CODE_SIGN_IDENTITY[sdk=iphoneos*]'] = 'Apple Distribution'
            end
          end
          project.save
          RUBY

      - name: Set up iOS code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "app.sociva.community" \
            --type IOS_APP_STORE \
            --create
          app-store-connect fetch-signing-files "app.sociva.community.LiveDeliveryWidget" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
          WIDGET_PROFILE=$(find ~/Library/MobileDevice/Provisioning\ Profiles -name '*.mobileprovision' -exec grep -l 'LiveDeliveryWidget' {} \; 2>/dev/null | head -1)
          if [ -z "$WIDGET_PROFILE" ]; then
            echo "ERROR: Widget provisioning profile not found after fetch."
            ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "No profiles directory"
            exit 1
          fi
          WIDGET_PROFILE_PLIST=$(mktemp)
          security cms -D -i "$WIDGET_PROFILE" > "$WIDGET_PROFILE_PLIST"
          export WIDGET_PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$WIDGET_PROFILE_PLIST")
          export WIDGET_PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$WIDGET_PROFILE_PLIST")
          echo "✅ Widget profile found: $WIDGET_PROFILE_NAME ($WIDGET_PROFILE_UUID)"
          cd ios/App
          ruby - << 'RUBY'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('App.xcodeproj')
          widget = project.targets.find { |t| t.name == 'LiveDeliveryWidgetExtension' }
          abort('Widget target not found') unless widget
          widget.build_configurations.each do |config|
            settings = config.build_settings
            settings['CODE_SIGN_STYLE'] = 'Manual'
            settings['DEVELOPMENT_TEAM'] = '6HBR38JB8Z'
            settings['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
            settings['CODE_SIGN_IDENTITY[sdk=iphoneos*]'] = 'Apple Distribution'
            settings['PROVISIONING_PROFILE_SPECIFIER'] = ENV.fetch('WIDGET_PROFILE_NAME')
            settings['PROVISIONING_PROFILE'] = ENV.fetch('WIDGET_PROFILE_UUID')
          end
          project.save
          RUBY
          cd ../..
          rm -f "$WIDGET_PROFILE_PLIST"

      - name: Verify widget signing settings (release-all)
        script: |
          cd ios/App
          ruby - << 'RUBY'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('App.xcodeproj')
          widget = project.targets.find { |t| t.name == 'LiveDeliveryWidgetExtension' }
          abort('Widget target not found') unless widget
          widget.build_configurations.each do |config|
            s = config.build_settings
            puts "=== #{config.name} ==="
            puts "  BUNDLE_ID: #{s['PRODUCT_BUNDLE_IDENTIFIER']}"
            puts "  TEAM: #{s['DEVELOPMENT_TEAM']}"
            puts "  SIGN_STYLE: #{s['CODE_SIGN_STYLE']}"
            puts "  SIGN_IDENTITY: #{s['CODE_SIGN_IDENTITY']}"
            puts "  PROFILE_SPECIFIER: #{s['PROVISIONING_PROFILE_SPECIFIER']}"
            puts "  PROFILE: #{s['PROVISIONING_PROFILE']}"
          end
          RUBY

      - name: Set export compliance & increment build number
        script: |
          cd ios/App
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" App/Info.plist || \
            /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" App/Info.plist
          BUILD_NUMBER=$(date +%s)
          echo "Setting build number to $BUILD_NUMBER"
          agvtool new-version -all $BUILD_NUMBER
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" LiveDeliveryWidgetExtension/Info.plist

      - name: Verify push entitlement exists (release-all)
        script: |
          if ! grep -q "aps-environment" ios/App/App/App.entitlements; then
            echo "ERROR: Push Notifications entitlement missing from App.entitlements"
            exit 1
          fi

      - name: Verify ActivityKit entitlement exists (release-all)
        script: |
          if ! grep -q "com.apple.developer.activitykit" ios/App/App/App.entitlements; then
            echo "ERROR: ActivityKit entitlement missing from App.entitlements"
            exit 1
          fi

      - name: Verify AppDelegate push registration (release-all)
        script: |
          if ! grep -q "didRegisterForRemoteNotificationsWithDeviceToken" ios/App/App/AppDelegate.swift; then
            echo "ERROR: AppDelegate missing APNs token forwarding"
            exit 1
          fi

      - name: Build iOS IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App" \
            --config "Release"

      - name: Validate IPA push entitlement (release-all)
        script: |
          cd /tmp && mkdir -p ipa-check-all && cd ipa-check-all
          IPA=$(find /Users -path '*/build/ios/ipa/*.ipa' | head -1)
          unzip -qo "$IPA" 2>/dev/null || true
          if ! grep -r "aps-environment" Payload/ 2>/dev/null; then
            echo "ERROR: Final IPA missing aps-environment entitlement"
            exit 1
          fi
          echo "=== IPA push entitlement verified ==="

      - name: Validate IPA contains a single widget extension (release-all)
        script: |
          cd /tmp/ipa-check-all
          COUNT=$(find Payload/App.app/PlugIns -maxdepth 1 -name "*.appex" | wc -l | tr -d ' ')
          if [ "$COUNT" -ne 1 ]; then
            echo "ERROR: Expected exactly one widget extension .appex, found $COUNT"
            find Payload/App.app/PlugIns -maxdepth 1 -name "*.appex" -print
            exit 1
          fi
          if [ ! -d "Payload/App.app/PlugIns/LiveDeliveryWidgetExtension.appex" ]; then
            echo "ERROR: LiveDeliveryWidgetExtension.appex not found"
            exit 1
          fi
          echo "=== Single LiveDeliveryWidgetExtension.appex verified ==="

      - name: Add Android platform
        script: |
          npx cap add android || true
          npx cap sync android

      - name: Copy custom notification sound (Android)
        script: |
          mkdir -p android/app/src/main/res/raw
          if [ -f "ios-config/gate_bell.mp3" ]; then
            cp ios-config/gate_bell.mp3 android/app/src/main/res/raw/gate_bell.mp3
            echo "=== gate_bell.mp3 copied to Android res/raw/ ==="
          fi

      - name: Set Android SDK
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Build Android AAB
        script: cd android && ./gradlew bundleRelease

    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - android/app/build/outputs/**/*.aab

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
