<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners for app icon -->
  <rect width="1024" height="1024" rx="180" fill="url(#bgGrad)"/>
  
  <!-- SOCIVA text with S and V in green -->
  <text x="512" y="540" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="200" font-weight="700" text-anchor="middle" dominant-baseline="middle" letter-spacing="-4">
    <tspan fill="#10b981">S</tspan><tspan fill="#e8e8e8">OCI</tspan><tspan fill="#10b981">V</tspan><tspan fill="#e8e8e8">A</tspan>
  </text>
